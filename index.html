<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELIHOWAKE — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-dim: #7a5e28;
    --bg: #080808;
    --fg: #e8e0d0;
    --fg-dim: #6b6358;
    --line: rgba(201,168,76,0.18);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  canvas#grain {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: 0.055;
    z-index: 0;
  }

  .scene {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* Eye SVG */
  .eye-wrap {
    position: relative;
    width: 100px;
    height: 122px;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.3s forwards;
  }

  .eye-wrap svg {
    width: 100%;
    height: 100%;
  }

  /* outer shape — slow breathe */
  .logo-outer {
    transform-origin: 41.5px 50.5px;
    animation: breathe 5s ease-in-out infinite;
  }

  /* inner eye — pulse */
  .logo-eye {
    transform-origin: 41.5px 37.125px;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.04); opacity: 0.85; }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(0.82); opacity: 0.65; }
  }

  /* Studio name */
  .studio {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 96px);
    letter-spacing: 0.22em;
    color: var(--fg);
    line-height: 1;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.55s forwards;
    position: relative;
  }

  .studio::after {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-top: 14px;
    opacity: 0;
    animation: lineIn 1s ease 1.2s forwards;
  }

  /* Tagline */
  .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 1.5vw, 13px);
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-top: 18px;
    opacity: 0;
    animation: fadeUp 1s ease 1s forwards;
  }

  /* Game block */
  .game-block {
    margin-top: 64px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1s ease 1.3s forwards;
  }

  .game-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5em;
    color: var(--fg-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    letter-spacing: 0.3em;
    color: var(--gold);
    line-height: 1;
  }

  .game-sub {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--fg-dim);
    margin-top: 10px;
    font-weight: 300;
  }

  /* Countdown */
  .countdown {
    display: flex;
    gap: 40px;
    margin-top: 56px;
    opacity: 0;
    animation: fadeUp 1s ease 1.6s forwards;
  }

  .cd-item {
    text-align: center;
  }

  .cd-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 5vw, 52px);
    color: var(--fg);
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .cd-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.45em;
    color: var(--fg-dim);
    margin-top: 6px;
    text-transform: uppercase;
  }

  .cd-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: var(--gold-dim);
    align-self: flex-start;
    margin-top: 6px;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Corner lines */
  .corner {
    position: fixed;
    width: 32px;
    height: 32px;
    opacity: 0;
    animation: fadeIn 1.5s ease 1.8s forwards;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--gold-dim);
  }
  .corner::before { width: 1px; height: 100%; }
  .corner::after { width: 100%; height: 1px; }

  .corner.tl { top: 32px; left: 32px; }
  .corner.tl::before { top: 0; left: 0; }
  .corner.tl::after { top: 0; left: 0; }

  .corner.tr { top: 32px; right: 32px; }
  .corner.tr::before { top: 0; right: 0; }
  .corner.tr::after { top: 0; right: 0; }

  .corner.bl { bottom: 32px; left: 32px; }
  .corner.bl::before { bottom: 0; left: 0; }
  .corner.bl::after { bottom: 0; left: 0; }

  .corner.br { bottom: 32px; right: 32px; }
  .corner.br::before { bottom: 0; right: 0; }
  .corner.br::after { bottom: 0; right: 0; }

  /* Bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 32px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--fg-dim);
    opacity: 0;
    animation: fadeIn 1s ease 2s forwards;
    z-index: 2;
  }

  /* Scan line */
  .scanline {
    position: fixed;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.08), transparent);
    animation: scan 8s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes scan {
    0% { top: -1px; }
    100% { top: 100%; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes lineIn {
    from { opacity: 0; transform: scaleX(0); }
    to { opacity: 1; transform: scaleX(1); }
  }
</style>
</head>

  </div>

  <div class="studio">RELIHOWAKE</div>

  <div class="game-block">
    <div class="game-label">First title</div>

<script>
// Film grain
(function(){
  const c = document.getElementById('grain');
  const ctx = c.getContext('2d');
  function resize(){ c.width = window.innerWidth; c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  function draw(){
    const w = c.width, h = c.height;
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for(let i=0;i<d.length;i+=4){
      const v = Math.random()*255|0;
      d[i]=d[i+1]=d[i+2]=v; d[i+3]=255;
    }
    ctx.putImageData(img,0,0);
  }
  setInterval(draw, 80);
})();

// Countdown — target date, change as needed
(function(){
  const target = new Date('2026-01-01T00:00:00');
  function pad(n,l=2){ return String(n).padStart(l,'0'); }
  function tick(){
    const now = new Date();
    let diff = Math.max(0, target - now) / 1000;
    const d = Math.floor(diff/86400); diff -= d*86400;
    const h = Math.floor(diff/3600); diff -= h*3600;
    const m = Math.floor(diff/60); diff -= m*60;
    const s = Math.floor(diff);
    document.getElementById('cd-d').textContent = pad(d,3);
    document.getElementById('cd-h').textContent = pad(h);
    document.getElementById('cd-m').textContent = pad(m);
    document.getElementById('cd-s').textContent = pad(s);
  }
  tick();
  setInterval(tick, 1000);
})();
</script>
